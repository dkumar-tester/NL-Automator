<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>NL-Automator Settings</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f9fafb;
            --card: #ffffff;
            --text: #111827;
            --border: #e5e7eb;
            --accent: #f3f4f6;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--border);
        }

        h1 {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 1.5rem;
            color: var(--primary);
        }

        .section {
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            background: var(--accent);
        }

        .section h2 {
            font-size: 1.125rem;
            margin-top: 0;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.35rem;
        }

        select,
        input {
            width: 100%;
            padding: 0.65rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.875rem;
            box-sizing: border-box;
            background: white;
        }

        select:focus,
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .active-provider-select {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border);
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #4338ca;
        }

        #status {
            margin-top: 1rem;
            font-size: 0.875rem;
            text-align: center;
            padding: 0.5rem;
            border-radius: 4px;
            display: none;
        }

        .status-success {
            background-color: #dcfce7;
            color: #166534;
            display: block !important;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>AI Provider Settings</h1>

        <div class="form-group active-provider-select">
            <label for="activeProvider">Active AI Provider</label>
            <select id="activeProvider">
                <option value="gemini">Google Gemini</option>
                <option value="openai">OpenAI (ChatGPT)</option>
                <option value="xai">xAI (Grok)</option>
            </select>
        </div>

        <!-- Gemini Section -->
        <div class="section">
            <h2>Google Gemini</h2>
            <div class="form-group">
                <label for="geminiModel">Model</label>
                <select id="geminiModel">
                    <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
                    <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                </select>
            </div>
            <div class="form-group">
                <label for="geminiKey">API Key</label>
                <input type="password" id="geminiKey" placeholder="Enter Gemini Key">
            </div>
        </div>

        <!-- OpenAI Section -->
        <div class="section">
            <h2>OpenAI</h2>
            <div class="form-group">
                <label for="openaiModel">Model</label>
                <select id="openaiModel">
                    <option value="gpt-4o">GPT-4o</option>
                    <option value="gpt-4o-mini">GPT-4o-mini</option>
                </select>
            </div>
            <div class="form-group">
                <label for="openaiKey">API Key</label>
                <input type="password" id="openaiKey" placeholder="Enter OpenAI Key">
            </div>
        </div>

        <!-- xAI Section -->
        <div class="section">
            <h2>xAI (Grok)</h2>
            <div class="form-group">
                <label for="xaiModel">Model</label>
                <select id="xaiModel">
                    <option value="grok-2-latest">Grok-2 Latest</option>
                    <option value="grok-4-fast">Grok-4 Fast</option>
                </select>
            </div>
            <div class="form-group">
                <label for="xaiKey">API Key</label>
                <input type="password" id="xaiKey" placeholder="Enter Grok Key">
            </div>
        </div>

        <button id="save">Save All Settings</button>
        <div id="status">Settings saved!</div>
    </div>
    <script src="options.js"></script>
</body>

</html>
