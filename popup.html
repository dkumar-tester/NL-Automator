<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>NL-Automator Popup</title>
  <style>
    /* 
      BASIC STYLING:
      We use a simple, clean layout so it's easy to understand.
    */
    body {
      width: 320px;
      padding: 15px;
      font-family: system-ui, -apple-system, sans-serif;
    }

    textarea {
      width: 100%;
      height: 80px;
      margin-bottom: 10px;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #4f46e5;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background-color: #4338ca;
    }

    .status {
      font-size: 12px;
      color: #666;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <h3>NL-Automator</h3>
  <!-- The user types their command here -->
  <textarea id="commandInput" placeholder="e.g., Click the 'Log In' button"></textarea>

  <!-- This button triggers the automation process -->
  <button id="runBtn">Run Automation</button>

  <!-- We'll use this area to show feedback or API status -->
  <div id="statusArea" class="status">Initializing...</div>

  <script src="popup.js"></script>
</body>

</html>
